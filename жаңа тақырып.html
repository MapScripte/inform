<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Жаңа тақырып: Ғаламторда іздеуді ұйымдастыру</title>
    <style>
        /* Сайттың жалпы стилі */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        /* Контейнер стилі */
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 90%;
            text-align: center;
        }

        /* Тақырыптар стилі */
        h1 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 10px;
        }

        h2 {
            color: #3498db;
            font-size: 22px;
            margin-top: 0;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            color: #555;
            margin-bottom: 30px;
        }

        /* Видеоға арналған адаптивті контейнер */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 қатынасы */
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            background: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Төменгі жақтағы ескерту */
        .footer-note {
            margin-top: 20px;
            font-style: italic;
            color: #e67e22;
            font-weight: bold;
        }
        .back-btn {
            position: fixed; top: 20px; left: 20px;
            background-color: #f1c40f; color: rgb(7, 6, 6);
            border: none; padding: 10px 18px;
            font-size: 14px; border-radius: 10px;
            cursor: pointer; z-index: 150;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="history.back()">⬅ Артқа қайту</button>

    <div class="container">
        <h1>Жаңа тақырып</h1>
        <h2>Ғаламторда іздеуді ұйымдастыру</h2>

        <p>Жаңа тақырыпты мұқият тыңдап, соңында берілген тапсырманы орындаймыз.</p>

        <div class="video-wrapper">
            <iframe 
                src="https://www.youtube.com/embed/WgHK2m4HjTo" 
                title="Ғаламторда іздеуді ұйымдастыру" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                allowfullscreen>
            </iframe>
        </div>

        <div class="footer-note">
            Сәттілік тілеймін!
        </div>
    </div>

</body>
</html>
